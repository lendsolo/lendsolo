# Solid Queue recurring tasks
# These run automatically on the specified schedule

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  payment_reminders:
    class: PaymentReminderJob
    queue: default
    schedule: every day at 8am

  late_payment_notices:
    class: LatePaymentNoticeJob
    queue: default
    schedule: every day at 9am

  monthly_portfolio_summary:
    class: MonthlySummaryJob
    queue: default
    schedule: on the 1st of every month at 7am

development:
  payment_reminders:
    class: PaymentReminderJob
    queue: default
    schedule: every day at 8am

  late_payment_notices:
    class: LatePaymentNoticeJob
    queue: default
    schedule: every day at 9am

  monthly_portfolio_summary:
    class: MonthlySummaryJob
    queue: default
    schedule: on the 1st of every month at 7am
