databases:
  - name: lendsolo-db
    plan: free
    databaseName: lendsolo_production
    user: lendsolo

services:
  - type: web
    name: lendsolo
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install &&
      npm install &&
      npx vite build
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lendsolo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SOLO_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_FUND_PRICE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_DOMAIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: lendsolo-worker
    runtime: ruby
    plan: starter
    buildCommand: |
      bundle install &&
      npm install
    startCommand: bundle exec bin/jobs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lendsolo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_DOMAIN
        sync: false
